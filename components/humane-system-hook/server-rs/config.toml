[llm]
provider = "gemini"          # "gemini", "anthropic", "openai", "openai-compatible", "echo"
model = "gemini-2.5-flash"   # model ID for the provider
# api_key = "..."            # optional, overrides env var
# base_url = "..."           # optional, for openai-compatible providers
# gemini_google_search = true # enable built-in Google Search grounding (Gemini only)

[server]
port = 9090
public_addr = "192.168.1.125:9090"
system_prompt = "You are a helpful assistant running on a Humane AI Pin. Keep responses concise - they will be displayed on a laser projector and spoken aloud."

[storage]
media_dir = "./media"       # directory for captured photos, videos, and notes

[weather]
# pirate_weather_api_key = "your-key-here"  # from https://pirate-weather.apiable.io
